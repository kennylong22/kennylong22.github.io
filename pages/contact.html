        <main class="contact">
            <h1>Contact Me</h1>
            <form action="https://formsubmit.co/long.kenny.r@gmail.com" method="POST" id="form" novalidate>
                <input type="hidden" name="_next" value="https://kennylongdev.com/thankyou.html">
                <input type="hidden" name="_subject" value="Response from portfolio website">

                <fieldset>
                    <legend>About you</legend>
                    <div>
                        <label for="name">Name:</label>
                        <input type="text" name="name" id="name" required>
                    </div>
                    
                    <div>
                        <label for="email">Email:</label>
                        <input type="email" name="email" id="email" required>
                    </div>
                </fieldset>

                <fieldset>
                    <legend>Your message</legend>
                    <div>
                        <label for="message">Write your message here:</label>
                        <textarea name="message" id="message" cols="30" rows="10" style="display: block;"></textarea required>
                    </div>
                </fieldset>       
                <button type="submit" class="btn">Send</button>   
           </form>
