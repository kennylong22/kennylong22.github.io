<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Me</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.2/css/all.min.css" integrity="sha512-1sCRPdkRXhBV2PBLUdRb4tMg1w2YPf37qatUFeS7zlBy7jJI8Lf4VHwWfZZfpXtYSLy85pkm9GaYVYMfw5BC1A==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="apple-touch-icon" sizes="180x180" href="favicon/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon/favicon-16x16.png">
    <link rel="manifest" href="favicon/site.webmanifest">
</head>
<body>
    <div class="container">
        <nav class="nav">
            <ul class="nav-list">
                <li class="nav-list__item"><a href="#projects">Projects</a></li>
                <li class="nav-list__item"><a href="https://www.linkedin.com/in/kenny-long/" target="_blank">LinkedIn</a></li>
                <li class="nav-list__item"><a href="mailto:long.kenny.r@gmail.com" target="_blank">Contact</a></li>
                <li class="nav-list__item"><a href="https://drive.google.com/file/d/1gpoY3XgAX5D3Xvszz60hTukF1l8aV2Yl/view?usp=sharing" target="_blank">Resume</a></li>
            </ul>
        </nav>

        <main class="contact">
            <form action="https://formsubmit.co/long.kenny.r@gmail.com" method="POST">
                <input type="hidden" name="_next" value="https://kennylongdev.com/thankyou.html">
                <input type="hidden" name="_subject" value="Response from portfolio website">

                <div>
                    <label for="name">Name:</label>
                    <input type="text" name="name" id="name" required>
                </div>
                
                <div>
                    <label for="email">Email:</label>
                    <input type="email" name="email" id="email" required>
                </div>

                <div>
                    <label for="message">Write your message here:</label>
                    <textarea name="message" id="message" cols="30" rows="10" style="display: block;"></textarea required>
                </div>
                
                <button type="submit">Send</button>   
           </form>
        </main>
    </div>
</body>
</html>
